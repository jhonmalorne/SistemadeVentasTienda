<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>POS Escamilla B. Wilson M. | Sistema Empresarial</title>
  <!-- Bootstrap 5 + Tailwind + Font Awesome + Librerías -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js, SheetJS, html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Firebase SDKs modular -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, Timestamp, writeBatch, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    window.firebaseApp = { initializeApp, getFirestore, collection, doc, getDocs, addDoc, updateDoc, deleteDoc, query, where, orderBy, onSnapshot, Timestamp, writeBatch, enableIndexedDbPersistence };
  </script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e293b">
  <style>
    /* Estilos personalizados + modo oscuro */
    :root {
      --bg-light: #f8fafc;
      --card-light: #ffffff;
      --text-light: #0f172a;
      --border-light: #e2e8f0;
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
      --text-dark: #f1f5f9;
      --border-dark: #334155;
    }
    body {
      transition: background 0.3s, color 0.2s;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto;
    }
    body.dark {
      background-color: var(--bg-dark);
      color: var(--text-dark);
    }
    .card-modern {
      background: var(--card-light);
      border-radius: 24px;
      border: none;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
      transition: all 0.2s;
    }
    body.dark .card-modern {
      background: var(--card-dark);
      border: 1px solid var(--border-dark);
    }
    .btn-pos {
      border-radius: 40px;
      padding: 10px 22px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-btn {
      background: transparent;
      border: none;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 40px;
      color: #475569;
    }
    body.dark .nav-btn { color: #cbd5e1; }
    .nav-btn.active {
      background: #3b82f6;
      color: white;
      box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }
    .stock-bajo {
      color: #ef4444;
      font-weight: bold;
      background: #fee2e2;
      border-radius: 20px;
      padding: 2px 10px;
      display: inline-block;
    }
    body.dark .stock-bajo { background: #7f1a1a; color: #fecaca; }
    .producto-card {
      transition: 0.1s ease;
      cursor: pointer;
    }
    .producto-card:hover { transform: translateY(-2px); background: #f1f5f9; }
    body.dark .producto-card:hover { background: #334155; }
    .factura-preview {
      max-width: 400px;
      background: white;
      color: black;
      padding: 20px;
      font-family: monospace;
      border-radius: 16px;
    }
    .toast-notify {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
    }
    @media (max-width: 768px) {
      .nav-btn { padding: 6px 12px; font-size: 0.8rem; }
      .card-modern { border-radius: 20px; }
    }
    .bg-watermark {
      position: relative;
      overflow: hidden;
    }
    .bg-watermark::after {
      content: "Nota de Venta";
      position: absolute;
      opacity: 0.1;
      font-size: 3rem;
      font-weight: bold;
      bottom: 10px;
      right: 20px;
      transform: rotate(-15deg);
      pointer-events: none;
    }
  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 dark:bg-slate-900">
  <!-- Header Superior -->
  <div class="bg-white dark:bg-slate-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-20">
    <div class="container-fluid px-4 py-3 flex justify-between items-center flex-wrap">
      <div>
        <h1 class="text-xl font-bold text-slate-800 dark:text-white">Escamilla B. Wilson M.</h1>
        <p class="text-xs text-gray-500 dark:text-gray-400">Valencia, Carabobo | 📞 0414-4372956 / 0412-4749513</p>
      </div>
      <div class="flex gap-2">
        <button id="darkModeToggle" class="btn btn-sm btn-outline-secondary rounded-full"><i class="fas fa-moon"></i></button>
        <button id="refreshSync" class="btn btn-sm btn-outline-primary rounded-full"><i class="fas fa-sync-alt"></i> Sync</button>
      </div>
    </div>
    <!-- Navegación principal -->
    <div class="px-4 pb-2 flex flex-wrap gap-1 overflow-x-auto">
      <button data-module="ventas" class="nav-btn active" id="navVentas"><i class="fas fa-cash-register mr-2"></i>Ventas</button>
      <button data-module="almacen" class="nav-btn"><i class="fas fa-boxes mr-2"></i>Almacén</button>
      <button data-module="fiados" class="nav-btn"><i class="fas fa-hand-holding-usd mr-2"></i>Fiados</button>
      <button data-module="reportes" class="nav-btn"><i class="fas fa-chart-line mr-2"></i>Cierre / Reportes</button>
      <button data-module="clientes" class="nav-btn"><i class="fas fa-users mr-2"></i>Clientes</button>
      <button data-module="proveedores" class="nav-btn"><i class="fas fa-truck mr-2"></i>Proveedores</button>
    </div>
  </div>

  <!-- CONTENEDOR DINÁMICO PRINCIPAL -->
  <main id="appContent" class="container-fluid px-3 py-4 max-w-7xl mx-auto"></main>

  <!-- Modal Factura para captura y envío -->
  <div class="modal fade" id="facturaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-gray-100">
        <div class="modal-header">
          <h5 class="modal-title">Factura / Nota de Venta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="facturaBodyRender">
          <!-- Factura renderizada acá -->
        </div>
        <div class="modal-footer">
          <button id="sendWhatsappBtn" class="btn btn-success"><i class="fab fa-whatsapp"></i> Enviar por WhatsApp</button>
          <button id="downloadInvoiceImg" class="btn btn-primary"><i class="fas fa-image"></i> Guardar Imagen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Pie de página -->
  <footer class="text-center text-xs text-gray-500 dark:text-gray-400 py-4 border-t mt-6">
    Sistema desarrollado por Nexus Marketing | 0424-4525765
  </footer>

  <div class="toast-notify" id="liveToast"></div>

  <!-- Cargar scripts modulares -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="utils.js"></script>
  <script type="module" src="ventas.js"></script>
  <script type="module" src="almacen.js"></script>
  <script type="module" src="clientes.js"></script>
  <script type="module" src="proveedores.js"></script>
  <script type="module" src="fiados.js"></script>
  <script type="module" src="reportes.js"></script>
</body>
</html>
