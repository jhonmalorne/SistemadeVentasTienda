<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>POS Escamilla B. Wilson M. | Sistema de Ventas Profesional</title>
    <!-- Tailwind + Font Awesome + Librerías Esenciales -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <!-- html2canvas para factura imagen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Chart.js (Opcional para gráficos en reportes) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* transiciones y estilos personalizados para alertas y scroll */
        .stock-alert { background-color: #fee2e2 !important; border-left: 4px solid #ef4444 !important; }
        .client-debt-row { background-color: #ffebee !important; border-left: 4px solid #d32f2f !important; font-weight: 500; }
        .tab-active { background-color: #2563eb; color: white; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .tab-inactive { background-color: #f3f4f6; color: #1f2937; border-radius: 0.5rem; }
        .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 8px; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 8px; }
        body { background: #f9fafb; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .invoice-watermark { position: relative; overflow: hidden; }
        .invoice-watermark::after { content: "NOTA DE VENTA"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-25deg); font-size: 3rem; font-weight: bold; color: rgba(0,0,0,0.05); white-space: nowrap; pointer-events: none; z-index: 0; }
    </style>
</head>
<body class="antialiased">

<div class="max-w-screen-2xl mx-auto p-3 md:p-5">
    <!-- HEADER con nombre empresa y navegación principal -->
    <div class="bg-white rounded-2xl shadow-md p-4 mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
        <div class="flex items-center gap-3">
            <div class="h-12 w-12 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center text-white text-xl shadow-md"><i class="fas fa-store"></i></div>
            <div>
                <h1 class="text-2xl font-extrabold text-gray-800 tracking-tight">Escamilla B. Wilson M.</h1>
                <p class="text-xs text-gray-500">Valencia, Edo. Carabobo · 📞 0414-4372956 / 0412-4749513</p>
            </div>
        </div>
        <div class="flex flex-wrap gap-2">
            <button data-tab="ventas" class="tab-btn px-4 py-2 text-sm font-semibold transition-all flex items-center gap-2 tab-active"><i class="fas fa-cash-register"></i> Ventas</button>
            <button data-tab="almacen" class="tab-btn px-4 py-2 text-sm font-semibold transition-all flex items-center gap-2 tab-inactive"><i class="fas fa-boxes"></i> Almacén</button>
            <button data-tab="fiados" class="tab-btn px-4 py-2 text-sm font-semibold transition-all flex items-center gap-2 tab-inactive"><i class="fas fa-hand-holding-usd"></i> Fiados</button>
            <button data-tab="reportes" class="tab-btn px-4 py-2 text-sm font-semibold transition-all flex items-center gap-2 tab-inactive"><i class="fas fa-chart-line"></i> Cierre / Reportes</button>
            <button data-tab="clientes" class="tab-btn px-4 py-2 text-sm font-semibold transition-all flex items-center gap-2 tab-inactive"><i class="fas fa-users"></i> Clientes</button>
            <button data-tab="proveedores" class="tab-btn px-4 py-2 text-sm font-semibold transition-all flex items-center gap-2 tab-inactive"><i class="fas fa-truck"></i> Proveedores</button>
        </div>
    </div>

    <!-- Contenedor de contenido dinámico (tabs) -->
    <div id="appContent" class="bg-white rounded-2xl shadow-lg p-4 md:p-6 transition-all duration-300"></div>

    <!-- MODAL Historial Producto (global) -->
    <div id="historialModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden transition-all">
        <div class="bg-white rounded-2xl max-w-3xl w-full mx-4 p-5 max-h-[80vh] overflow-auto shadow-2xl">
            <div class="flex justify-between items-center border-b pb-2 mb-3"><h3 class="text-xl font-bold"><i class="fas fa-history text-blue-600 mr-2"></i>Historial de ventas - <span id="historialProductoNombre"></span></h3><button id="closeHistorialModal" class="text-gray-500 hover:text-gray-800"><i class="fas fa-times text-2xl"></i></button></div>
            <div id="historialListado" class="space-y-2 text-sm"></div>
        </div>
    </div>

    <!-- MODAL para editar/ver detalle de deuda Fiado -->
    <div id="modalDeudaDetalle" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-2xl w-full max-w-2xl p-5"><div id="modalDeudaContent"></div><button id="closeDeudaModal" class="mt-4 bg-gray-200 px-4 py-2 rounded-lg">Cerrar</button></div>
    </div>
</div>

<script>
    // ----------------------- DATA MODEL & STORAGE -------------------------
    let db = {
        productos: [],      // { id, codigo, nombre, categoria, precio, stock, foto, fechaIngreso }
        facturas: [],      // { idFactura, numeroFactura, fecha, clienteId, clienteObj, total, items, metodoPago, vendedor, telefono, direccion }
        clientes: [],      // { id, nombre, telefono, direccion, zona, deudaTotal (acumulada de facturas fiado pendiente) }
        proveedores: [],   // { id, nombre, telefono, direccion, deudaTotal, historialCompras: [{ fecha, monto, pagado, nota }] }
        deudasFiado: [],   // { id, clienteId, facturaId, montoOriginal, saldoPendiente, estado, fecha, productosDetalle }
        comprasProveedor: [], // { id, proveedorId, montoTotal, saldoPendiente, fecha, descripcion, pagosRealizados }
        correlativoFactura: 1,
        zonasDireccion: ["Centro", "La Granja", "Prebo", "San Blas", "Michelena", "Tocuyito", "Otra (especificar)"]
    };

    // Helper: guardar en localStorage
    function persistData() { localStorage.setItem("pos_escamilla_data", JSON.stringify(db)); }
    function loadData() {
        let saved = localStorage.getItem("pos_escamilla_data");
        if(saved) {
            try {
                let parsed = JSON.parse(saved);
                db = {...db, ...parsed};
                if(!db.zonasDireccion) db.zonasDireccion = ["Centro", "La Granja", "Prebo", "San Blas", "Michelena", "Tocuyito", "Otra (especificar)"];
                if(!db.correlativoFactura) db.correlativoFactura = 1;
                if(!db.deudasFiado) db.deudasFiado = [];
                if(!db.comprasProveedor) db.comprasProveedor = [];
                if(!db.proveedores) db.proveedores = [];
                db.facturas = db.facturas || [];
                db.clientes = db.clientes || [];
                db.productos = db.productos || [];
            } catch(e) {}
        } else {
            // Datos demo
            db.productos = [
                { id: "p1", codigo: "001", nombre: "Mochila Escolar", categoria: "morrales", precio: 25.5, stock: 12, foto: "", fechaIngreso: new Date().toISOString() },
                { id: "p2", codigo: "002", nombre: "Peluche Mickey", categoria: "peluches", precio: 15.0, stock: 5, foto: "", fechaIngreso: new Date().toISOString() },
                { id: "p3", codigo: "003", nombre: "Cartuchera 3 compartimentos", categoria: "lonchera y cartucheras", precio: 8.99, stock: 7, foto: "", fechaIngreso: new Date().toISOString() }
            ];
            db.clientes = [{ id: "c1", nombre: "María Rodríguez", telefono: "04141234567", direccion: "Av Principal", zona: "Centro", deudaTotal: 0 }];
            db.proveedores = [{ id: "prov1", nombre: "Distribuidora Escolar CA", telefono: "0241-5551234", direccion: "Zona Industrial", deudaTotal: 0, historialCompras: [] }];
            db.facturas = [];
            db.deudasFiado = [];
            db.comprasProveedor = [];
            db.correlativoFactura = 1001;
            persistData();
        }
    }
    // actualizar deuda total clientes según deudasFiado
    function updateClientesDeudaTotal() {
        db.clientes.forEach(cli => { cli.deudaTotal = db.deudasFiado.filter(d => d.clienteId === cli.id && d.saldoPendiente > 0).reduce((sum, d) => sum + d.saldoPendiente, 0); });
        persistData();
    }
    // Helper para obtener producto por id
    function getProduct(id) { return db.productos.find(p => p.id === id); }

    // -------- RENDER PRINCIPAL (Tab switching) ----------
    let currentTab = "ventas";
    let carritoCompras = []; // { productId, cantidad, precioUnitario, nombre, codigo }
    let currentVentaCliente = null; let nombreClienteTemp = "", telefonoTemp = "", direccionTemp = "", zonaTemp = "", vendedorTemp = "";
    let metodoPagoTemp = "Efectivo"; let numeroFacturaEditable = "";
    function setTab(tab) { currentTab = tab; renderCurrentTab(); }
    function renderCurrentTab() {
        if(currentTab === "ventas") renderVentas();
        else if(currentTab === "almacen") renderAlmacen();
        else if(currentTab === "fiados") renderFiados();
        else if(currentTab === "reportes") renderReportes();
        else if(currentTab === "clientes") renderClientes();
        else if(currentTab === "proveedores") renderProveedores();
        document.querySelectorAll(".tab-btn").forEach(btn => {
            if(btn.dataset.tab === currentTab) btn.classList.add("tab-active"), btn.classList.remove("tab-inactive");
            else btn.classList.add("tab-inactive"), btn.classList.remove("tab-active");
        });
    }

    // ======================== SECCION VENTAS ==========================
    function renderVentas() {
        let html = `<div class="grid lg:grid-cols-3 gap-6"><div class="lg:col-span-2 space-y-4"><div class="flex gap-2"><div class="relative flex-1"><i class="fas fa-search absolute left-3 top-3 text-gray-400"></i><input type="text" id="searchProducto" placeholder="Buscar producto..." class="w-full pl-10 pr-4 py-2 border rounded-xl"></div><button id="btnAnularVenta" class="bg-red-100 text-red-700 px-4 rounded-xl"><i class="fas fa-trash-alt"></i> Anular venta</button></div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[55vh] overflow-y-auto p-1" id="productosGrid"></div></div>
        <div class="bg-gray-50 rounded-2xl p-4 space-y-3 shadow-inner"><h3 class="font-bold text-lg"><i class="fas fa-shopping-cart"></i> Nota de Venta</h3><div class="max-h-[65vh] overflow-y-auto space-y-3" id="carritoContainer"></div>
        <div><label>N° Factura:</label><input id="facturaNumeroInput" class="border rounded px-2 py-1 w-full" value="${db.correlativoFactura}"></div>
        <div><label>Cliente:</label><input list="clientesList" id="clienteNombreInput" placeholder="Nombre o seleccionar" class="border rounded w-full p-1"><datalist id="clientesList">${db.clientes.map(c=>`<option value="${c.nombre}"></option>`).join('')}</datalist></div>
        <div><label>Teléfono (WhatsApp):</label><input id="telefonoVentaInput" class="border rounded w-full p-1"></div><div><label>Dirección / Zona:</label><input id="direccionVentaInput" placeholder="Dirección" class="border rounded w-full p-1"><select id="zonaSelect" class="border rounded w-full mt-1">${db.zonasDireccion.map(z=>`<option>${z}</option>`).join('')}</select></div>
        <div><label>Vendedor:</label><input id="vendedorInput" class="border rounded w-full p-1" placeholder="Nombre vendedor"></div>
        <div><label>Método Pago:</label><select id="metodoPagoSelect" class="border rounded w-full p-1"><option>Efectivo</option><option>Pago Móvil</option><option>Divisas</option><option>Biopago</option><option>Transferencia</option><option>Fiado Credito</option><option>Binance</option></select></div>
        <button id="btnConcretarVenta" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-xl w-full mt-2"><i class="fab fa-whatsapp"></i> Enviar nota + Concretar venta</button></div></div>`;
        document.getElementById("appContent").innerHTML = html;
        renderProductosGrid();
        renderCarrito();
        attachVentasEvents();
    }
    function renderProductosGrid(filtro="") {
        let productosFiltrados = db.productos.filter(p => p.nombre.toLowerCase().includes(filtro.toLowerCase()) || p.codigo.includes(filtro));
        let grid = document.getElementById("productosGrid");
        if(grid) grid.innerHTML = productosFiltrados.map(p => `<div class="border rounded-xl p-3 ${p.stock <=6 ? 'stock-alert' : ''} bg-white shadow-sm"><div class="flex justify-between"><span class="font-bold">${p.nombre}</span><span class="text-sm text-gray-500">Cód:${p.codigo}</span></div><div class="text-blue-600 font-mono">$${p.precio.toFixed(2)}</div><div class="text-sm">Stock: ${p.stock} und</div><div class="flex gap-2 mt-2"><input type="number" id="cant-${p.id}" value="1" min="1" max="${p.stock}" class="w-20 border rounded p-1 text-center"><button data-id="${p.id}" class="btnAgregarCarrito bg-indigo-600 text-white px-3 py-1 rounded-lg text-sm"><i class="fas fa-plus"></i> Agregar</button><button data-id="${p.id}" class="btnHistorialProducto bg-gray-200 px-2 py-1 rounded-lg"><i class="fas fa-history"></i></button></div></div>`).join('');
        document.querySelectorAll('.btnAgregarCarrito').forEach(btn => btn.addEventListener('click', (e) => { let pid = btn.dataset.id; let cant = parseInt(document.getElementById(`cant-${pid}`).value); agregarAlCarrito(pid, cant); }));
        document.querySelectorAll('.btnHistorialProducto').forEach(btn => btn.addEventListener('click', (e) => { let pid = btn.dataset.id; mostrarHistorialProducto(pid); }));
    }
    function agregarAlCarrito(prodId, cantidad) { let prod = getProduct(prodId); if(!prod || prod.stock < cantidad) { alert("Stock insuficiente"); return; } let existente = carritoCompras.find(i=>i.productId === prodId); if(existente) existente.cantidad += cantidad; else carritoCompras.push({ productId:prodId, cantidad, precioUnitario:prod.precio, nombre:prod.nombre, codigo:prod.codigo }); renderCarrito(); }
    function renderCarrito() { let container = document.getElementById("carritoContainer"); if(!container) return; if(carritoCompras.length===0) { container.innerHTML="<div class='text-center text-gray-400'>Carrito vacío</div>"; return; } let total=0; container.innerHTML=carritoCompras.map((item,idx)=>{ let subtotal=item.cantidad*item.precioUnitario; total+=subtotal; return `<div class="bg-white p-2 rounded-lg border"><div><b>${item.nombre}</b> x${item.cantidad} $${item.precioUnitario.toFixed(2)} = $${subtotal.toFixed(2)}</div><div class="flex gap-2 mt-1"><input type="number" data-idx="${idx}" class="editCantidad w-16 border rounded" value="${item.cantidad}" min="1"><input type="number" data-idx="${idx}" class="editPrecio w-20 border rounded" step="0.01" value="${item.precioUnitario}"><button data-idx="${idx}" class="eliminarItem text-red-500"><i class="fas fa-trash"></i></button></div></div>`; }).join(''); document.querySelectorAll(".editCantidad").forEach(inp=>{ inp.addEventListener("change",(e)=>{ let idx=parseInt(inp.dataset.idx); let newCant=parseInt(inp.value); if(newCant>0){ let prod= getProduct(carritoCompras[idx].productId); if(prod && newCant<=prod.stock+carritoCompras[idx].cantidad) carritoCompras[idx].cantidad=newCant; else alert("Stock excede"); renderCarrito();} }); }); document.querySelectorAll(".editPrecio").forEach(inp=>{ inp.addEventListener("change",(e)=>{ let idx=parseInt(inp.dataset.idx); carritoCompras[idx].precioUnitario=parseFloat(inp.value); renderCarrito();}); }); document.querySelectorAll(".eliminarItem").forEach(btn=>{ btn.addEventListener("click",(e)=>{ let idx=parseInt(btn.dataset.idx); carritoCompras.splice(idx,1); renderCarrito();}); }); let totalDiv=document.createElement("div"); totalDiv.className="font-bold text-right mt-2 text-lg"; totalDiv.innerText=`Total USD: $${total.toFixed(2)}`; container.appendChild(totalDiv); }
    function anularVenta() { carritoCompras = []; renderCarrito(); alert("Venta anulada. Stock no afectado."); }
    async function concretarVenta() {
        let numeroFactura = document.getElementById("facturaNumeroInput").value.trim();
        if(db.facturas.some(f=>f.numeroFactura===numeroFactura && f.numeroFactura)){ alert("N° Factura repetido. Corrija o edite."); return; }
        if(carritoCompras.length===0){ alert("Carrito vacío"); return; }
        let clienteNombre = document.getElementById("clienteNombreInput").value.trim();
        let telefono = document.getElementById("telefonoVentaInput").value.trim();
        let direccion = document.getElementById("direccionVentaInput").value.trim();
        let zona = document.getElementById("zonaSelect").value;
        let vendedor = document.getElementById("vendedorInput").value.trim() || "Anónimo";
        let metodoPago = document.getElementById("metodoPagoSelect").value;
        if(!clienteNombre) { alert("Ingrese nombre del cliente"); return; }
        let clienteExistente = db.clientes.find(c=>c.nombre.toLowerCase()===clienteNombre.toLowerCase());
        if(!clienteExistente) { let newId = "c"+Date.now(); clienteExistente = { id:newId, nombre:clienteNombre, telefono, direccion, zona, deudaTotal:0 }; db.clientes.push(clienteExistente); persistData(); }
        else { clienteExistente.telefono = telefono || clienteExistente.telefono; clienteExistente.direccion = direccion || clienteExistente.direccion; clienteExistente.zona = zona; persistData(); }
        let itemsVenta = [];
        for(let item of carritoCompras){ let prod = getProduct(item.productId); if(!prod || prod.stock < item.cantidad){ alert(`Stock insuficiente para ${prod.nombre}`); return; } }
        for(let item of carritoCompras){ let prod = getProduct(item.productId); prod.stock -= item.cantidad; itemsVenta.push({productId:item.productId, nombre:item.nombre, cantidad:item.cantidad, precioUnitario:item.precioUnitario}); }
        let totalVenta = itemsVenta.reduce((acc,i)=>acc+(i.cantidad*i.precioUnitario),0);
        let facturaObj = { idFactura:"f"+Date.now(), numeroFactura, fecha:new Date().toISOString(), clienteId:clienteExistente.id, clienteObj:{nombre:clienteExistente.nombre,telefono, direccion}, total:totalVenta, items:itemsVenta, metodoPago, vendedor, telefono, direccionCompleta:direccion+" ("+zona+")" };
        db.facturas.push(facturaObj);
        if(metodoPago === "Fiado Credito") { let deuda = { id:"fd"+Date.now(), clienteId:clienteExistente.id, facturaId:facturaObj.idFactura, montoOriginal:totalVenta, saldoPendiente:totalVenta, estado:"Pendiente", fecha:new Date().toISOString(), productosDetalle:itemsVenta }; db.deudasFiado.push(deuda); updateClientesDeudaTotal(); }
        if(db.correlativoFactura <= parseInt(numeroFactura)) db.correlativoFactura = parseInt(numeroFactura)+1;
        persistData();
        // Generar imagen de factura
        let facturaHtml = generarHtmlFactura(facturaObj, clienteExistente);
        let tempDiv = document.createElement('div'); tempDiv.style.position='absolute'; tempDiv.style.left='-9999px'; tempDiv.innerHTML=facturaHtml; document.body.appendChild(tempDiv);
        let canvas = await html2canvas(tempDiv, { scale:2, backgroundColor:'#ffffff' });
        let imgData = canvas.toDataURL('image/png');
        let link = document.createElement('a'); link.download = `factura_${numeroFactura}.png`; link.href = imgData; link.click();
        if(telefono) { let mensaje = `Hola ${clienteExistente.nombre}, su compra N°${numeroFactura} total $${totalVenta.toFixed(2)}. Adjunto factura.`; window.open(`https://wa.me/${telefono.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(mensaje)}`, '_blank'); }
        alert("Venta concretada ✅ Stock actualizado. Factura descargada.");
        carritoCompras = []; renderVentas();
    }
    function generarHtmlFactura(factura, cliente){ let fecha=new Date(factura.fecha).toLocaleString(); return `<div class="w-[500px] p-5 bg-white font-mono invoice-watermark relative"><div class="text-center border-b pb-2"><h2 class="text-xl font-bold">Escamilla B. Wilson M.</h2><p class="text-xs">Valencia, Edo Carabobo | 0414-4372956 / 0412-4749513</p></div><div class="mt-2 text-xs"><strong>Factura N°:</strong> ${factura.numeroFactura} <br><strong>Fecha:</strong> ${fecha}<br><strong>Cliente:</strong> ${cliente.nombre}<br><strong>Dirección:</strong> ${factura.direccionCompleta||cliente.direccion}<br><strong>Vendedor:</strong> ${factura.vendedor}<br><strong>Método Pago:</strong> ${factura.metodoPago}</div><table class="w-full text-sm mt-3 border"><thead><tr><th>Producto</th><th>Cant</th><th>Precio $</th><th>Subtotal</th></tr></thead><tbody>${factura.items.map(i=>`<tr><td>${i.nombre}</td><td>${i.cantidad}</td><td>$${i.precioUnitario.toFixed(2)}</td><td>$${(i.cantidad*i.precioUnitario).toFixed(2)}</td></tr>`).join('')}</tbody></table><div class="text-right font-bold mt-2">TOTAL: $${factura.total.toFixed(2)}</div><div class="text-center text-[8px] text-gray-400 mt-4">Gracias por su compra - Nota de Venta</div></div>`; }
    function mostrarHistorialProducto(prodId){ let prod = getProduct(prodId); if(!prod) return; let ventasRelacionadas = db.facturas.filter(f=> f.items.some(it=>it.productId===prodId)); let htmlHistorial = ventasRelacionadas.map(v=>{ let itemV = v.items.find(i=>i.productId===prodId); let cantidad = itemV ? itemV.cantidad : 0; let monto = itemV ? itemV.cantidad*itemV.precioUnitario : 0; return `<div class="border p-2 rounded"><span class="font-semibold">${new Date(v.fecha).toLocaleDateString()}</span> - Cliente: ${v.clienteObj.nombre} | Cant: ${cantidad} | Monto: $${monto.toFixed(2)} | Vendedor: ${v.vendedor}</div>`; }).join(''); if(!htmlHistorial) htmlHistorial="<div>Sin movimientos</div>"; document.getElementById("historialProductoNombre").innerText=prod.nombre; document.getElementById("historialListado").innerHTML=htmlHistorial; document.getElementById("historialModal").classList.remove("hidden"); }
    function attachVentasEvents(){ document.getElementById("searchProducto")?.addEventListener("input",(e)=>renderProductosGrid(e.target.value)); document.getElementById("btnAnularVenta")?.addEventListener("click",anularVenta); document.getElementById("btnConcretarVenta")?.addEventListener("click",concretarVenta); document.getElementById("closeHistorialModal")?.addEventListener("click",()=>document.getElementById("historialModal").classList.add("hidden")); }

    // ======================= ALMACEN ========================
    function renderAlmacen(){ let html=`<div><div class="flex flex-wrap gap-2 mb-4"><button id="btnAgregarProducto" class="bg-blue-600 text-white px-4 py-2 rounded-xl"><i class="fas fa-plus"></i> Nuevo producto</button><button id="btnDescargarInventarioExcel" class="bg-green-600 text-white px-4 py-2 rounded-xl"><i class="fas fa-file-excel"></i> Exportar inventario</button><select id="filtroCategoriaAlmacen" class="border rounded p-2"><option value="">Todas categorías</option>${Array.from(new Set(db.productos.map(p=>p.categoria))).map(c=>`<option>${c}</option>`).join('')}</select></div><div id="listaProductosAlmacen" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div></div>`; document.getElementById("appContent").innerHTML=html; renderListaProductosAlmacen(); document.getElementById("btnAgregarProducto")?.addEventListener("click",mostrarModalAgregarProducto); document.getElementById("btnDescargarInventarioExcel")?.addEventListener("click",()=>{ let ws= XLSX.utils.json_to_sheet(db.productos.map(p=>({Codigo:p.codigo, Nombre:p.nombre, Categoria:p.categoria, Stock:p.stock, PrecioUSD:p.precio}))); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Inventario"); XLSX.writeFile(wb,"Inventario_Escamilla.xlsx"); }); document.getElementById("filtroCategoriaAlmacen")?.addEventListener("change",(e)=>renderListaProductosAlmacen(e.target.value)); }
    function renderListaProductosAlmacen(catFiltro=""){ let filtrados = catFiltro ? db.productos.filter(p=>p.categoria===catFiltro) : db.productos; let contenedor=document.getElementById("listaProductosAlmacen"); if(contenedor) contenedor.innerHTML=filtrados.map(p=>`<div class="border rounded-xl p-3"><div><b>${p.nombre}</b> (${p.codigo})</div><div>Stock: ${p.stock} | $${p.precio}</div><div>Categoría: ${p.categoria}</div><div class="flex gap-2 mt-2"><button data-id="${p.id}" class="editarProductoBtn bg-yellow-500 text-white px-2 py-1 rounded">Editar</button><button data-id="${p.id}" class="retirarStockBtn bg-red-500 text-white px-2 py-1 rounded">Retirar</button><button data-id="${p.id}" class="agregarStockBtn bg-green-500 text-white px-2 py-1 rounded">+Stock</button></div></div>`).join(''); document.querySelectorAll(".editarProductoBtn").forEach(b=>b.addEventListener("click",(e)=>editarProducto(b.dataset.id))); document.querySelectorAll(".retirarStockBtn").forEach(b=>b.addEventListener("click",()=>{ let prod=getProduct(b.dataset.id); let cant=prompt("Cantidad a retirar:"); if(cant && !isNaN(cant) && prod.stock>=parseInt(cant)){ prod.stock-=parseInt(cant); persistData(); renderAlmacen();} else alert("Stock insuficiente");})); document.querySelectorAll(".agregarStockBtn").forEach(b=>b.addEventListener("click",()=>{ let prod=getProduct(b.dataset.id); let cant=prompt("Agregar stock:"); if(cant && !isNaN(cant)){ prod.stock+=parseInt(cant); persistData(); renderAlmacen();} })); }
    function mostrarModalAgregarProducto(){ let nombre=prompt("Nombre producto:"); if(!nombre) return; let categoria=prompt("Categoría (accesorios, juguetes, morrales, etc)")||"General"; let precio=parseFloat(prompt("Precio USD:")); let stock=parseInt(prompt("Stock inicial:")); let codigo= "PROD-"+ (db.productos.length+1000); let newId="p"+Date.now(); db.productos.push({ id:newId, codigo, nombre, categoria, precio, stock, foto:"", fechaIngreso:new Date().toISOString() }); persistData(); renderAlmacen(); }
    function editarProducto(id){ let prod=getProduct(id); if(!prod) return; let nuevoNombre=prompt("Nombre",prod.nombre); let nuevoPrecio=prompt("Precio USD",prod.precio); if(nuevoNombre) prod.nombre=nuevoNombre; if(nuevoPrecio) prod.precio=parseFloat(nuevoPrecio); persistData(); renderAlmacen(); }
    // ======================= FIADOS ========================
    function renderFiados(){ let deudasAgrupadas = db.deudasFiado.filter(d=>d.saldoPendiente>0); let html=`<div><button id="descargarExcelFiados" class="bg-blue-600 text-white px-4 py-2 rounded-xl mb-3"><i class="fas fa-download"></i> Descargar Excel Deudas</button><div class="grid gap-3">${deudasAgrupadas.map(d=>{ let cliente=db.clientes.find(c=>c.id===d.clienteId); return `<div class="border p-3 rounded-xl flex justify-between items-center"><div><b>${cliente?.nombre || "Cliente"}</b><br>Deuda: $${d.saldoPendiente.toFixed(2)} (Total original: $${d.montoOriginal})<br>Fecha: ${new Date(d.fecha).toLocaleDateString()}</div><div><button data-id="${d.id}" class="pagarDeudaBtn bg-green-600 text-white px-3 py-1 rounded">Pagar</button><button data-id="${d.id}" class="verDetalleDeudaBtn bg-gray-500 text-white px-3 py-1 rounded">Detalle</button></div></div>`; }).join('')}</div></div>`; document.getElementById("appContent").innerHTML=html; document.getElementById("descargarExcelFiados")?.addEventListener("click",()=>{ let data=db.deudasFiado.map(d=>({ Cliente:db.clientes.find(c=>c.id===d.clienteId)?.nombre, MontoOriginal:d.montoOriginal, Saldo:d.saldoPendiente, Fecha:d.fecha, Estado:d.estado })); let ws=XLSX.utils.json_to_sheet(data); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Deudas"); XLSX.writeFile(wb,"Deudas_Fiados.xlsx"); }); document.querySelectorAll(".pagarDeudaBtn").forEach(btn=>{ btn.addEventListener("click",()=>{ let deudaId=btn.dataset.id; let deuda=db.deudasFiado.find(d=>d.id===deudaId); let pago=parseFloat(prompt(`Saldo pendiente: $${deuda.saldoPendiente}. Monto a pagar:`)); if(pago>0 && pago<=deuda.saldoPendiente){ deuda.saldoPendiente-=pago; if(deuda.saldoPendiente<=0) deuda.estado="Pagado"; updateClientesDeudaTotal(); persistData(); renderFiados(); alert("Pago registrado");} }); }); document.querySelectorAll(".verDetalleDeudaBtn").forEach(btn=>{ btn.addEventListener("click",()=>{ let deuda=db.deudasFiado.find(d=>d.id===btn.dataset.id); let factura=db.facturas.find(f=>f.idFactura===deuda.facturaId); document.getElementById("modalDeudaContent").innerHTML=`<h3 class="font-bold">Detalle deuda</h3><pre>${JSON.stringify(factura?.items || deuda.productosDetalle,null,2)}</pre><p>Total adeudado: $${deuda.saldoPendiente}</p>`; document.getElementById("modalDeudaDetalle").classList.remove("hidden"); }); }); document.getElementById("closeDeudaModal")?.addEventListener("click",()=>document.getElementById("modalDeudaDetalle").classList.add("hidden")); }
    // ======================= REPORTES ========================
    function renderReportes(){ let ventas=db.facturas; let html=`<div><button id="btnExcelVentas" class="bg-green-600 text-white px-3 py-2 rounded-xl">Reporte Ventas Excel</button><button id="btnInventarioHoyExcel" class="bg-blue-600 text-white px-3 py-2 rounded-xl">Inventario Actual Excel</button><div class="overflow-auto mt-4"><table class="w-full text-sm border"><thead><tr><th>Fecha</th><th>Factura</th><th>Cliente</th><th>Total $</th><th>Método</th><th>Vendedor</th></tr></thead><tbody>${ventas.map(v=>`<tr><td>${new Date(v.fecha).toLocaleString()}</td><td>${v.numeroFactura}</td><td>${v.clienteObj.nombre}</td><td>$${v.total.toFixed(2)}</td><td>${v.metodoPago}</td><td>${v.vendedor}</td></tr>`).join('')}</tbody></table></div></div>`; document.getElementById("appContent").innerHTML=html; document.getElementById("btnExcelVentas")?.addEventListener("click",()=>{ let ws=XLSX.utils.json_to_sheet(db.facturas.map(f=>({Factura:f.numeroFactura, Fecha:f.fecha, Cliente:f.clienteObj.nombre, Total:f.total, Metodo:f.metodoPago, Vendedor:f.vendedor}))); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Ventas"); XLSX.writeFile(wb,"Reporte_Ventas.xlsx"); }); document.getElementById("btnInventarioHoyExcel")?.addEventListener("click",()=>{ let ws=XLSX.utils.json_to_sheet(db.productos.map(p=>({Codigo:p.codigo,Nombre:p.nombre,Stock:p.stock,Precio:p.precio}))); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Inventario"); XLSX.writeFile(wb,"Inventario_Hoy.xlsx"); }); }
    // ======================= CLIENTES ========================
    function renderClientes(){ let filtroHtml=`<input type="text" id="filtroClientes" placeholder="Buscar por nombre..." class="border rounded p-2 w-full mb-3"><div id="listaClientes" class="grid gap-2"></div>`; document.getElementById("appContent").innerHTML=filtroHtml; function cargarClientes(filtro=""){ let clis=db.clientes.filter(c=>c.nombre.toLowerCase().includes(filtro.toLowerCase())); let container=document.getElementById("listaClientes"); if(container) container.innerHTML=clis.map(c=>`<div class="border p-3 rounded-xl flex justify-between items-center ${c.deudaTotal>0 ? 'client-debt-row' : ''}"><div><b>${c.nombre}</b><br>📞 ${c.telefono || "N/A"} | ${c.direccion}<br>Deuda total: $${c.deudaTotal.toFixed(2)}</div><button data-id="${c.id}" class="verComprasCliente bg-indigo-500 text-white px-3 py-1 rounded">Historial</button></div>`).join(''); document.querySelectorAll(".verComprasCliente").forEach(btn=>{ btn.addEventListener("click",()=>{ let clienteId=btn.dataset.id; let compras=db.facturas.filter(f=>f.clienteId===clienteId); let deudas=db.deudasFiado.filter(d=>d.clienteId===clienteId && d.saldoPendiente>0); alert(`Compras: ${compras.length} facturas. Deuda actual: ${deudas.reduce((a,b)=>a+b.saldoPendiente,0).toFixed(2)} USD`); }); }); } document.getElementById("filtroClientes")?.addEventListener("input",(e)=>cargarClientes(e.target.value)); cargarClientes(); }
    // ======================= PROVEEDORES ========================
    function renderProveedores(){ let html=`<div><button id="nuevoProveedorBtn" class="bg-indigo-600 text-white px-3 py-2 rounded-xl mb-3"><i class="fas fa-plus"></i> Agregar Proveedor</button><div id="listaProveedores" class="grid gap-3"></div></div>`; document.getElementById("appContent").innerHTML=html; renderListaProveedores(); document.getElementById("nuevoProveedorBtn")?.addEventListener("click",()=>{ let nom=prompt("Nombre proveedor"); if(nom){ db.proveedores.push({ id:"pr"+Date.now(), nombre:nom, telefono:"", direccion:"", deudaTotal:0, historialCompras:[] }); persistData(); renderProveedores(); } }); }
    function renderListaProveedores(){ let container=document.getElementById("listaProveedores"); if(container) container.innerHTML=db.proveedores.map(p=>`<div class="border p-3 rounded-xl"><b>${p.nombre}</b> | Deuda: $${p.deudaTotal}<br><button data-id="${p.id}" class="registrarCompraBtn bg-green-500 text-white px-2 py-1 rounded mr-2">Registrar compra</button><button data-id="${p.id}" class="pagarProveedorBtn bg-yellow-500 text-white px-2 py-1 rounded">Pagar</button><button data-id="${p.id}" class="verHistorialProvBtn bg-gray-500 text-white px-2 py-1 rounded">Historial</button></div>`).join(''); document.querySelectorAll(".registrarCompraBtn").forEach(btn=>{ btn.addEventListener("click",()=>{ let prov=db.proveedores.find(p=>p.id===btn.dataset.id); let monto=parseFloat(prompt("Monto compra USD:")); if(monto){ prov.deudaTotal+=monto; prov.historialCompras.push({fecha:new Date().toISOString(), monto, pagado:0, nota:"Compra registrada"}); persistData(); renderProveedores();} }); }); document.querySelectorAll(".pagarProveedorBtn").forEach(btn=>{ btn.addEventListener("click",()=>{ let prov=db.proveedores.find(p=>p.id===btn.dataset.id); let pago=parseFloat(prompt(`Deuda actual: $${prov.deudaTotal}. Monto a pagar:`)); if(pago && pago<=prov.deudaTotal){ prov.deudaTotal-=pago; persistData(); renderProveedores(); alert("Pago registrado");} }); }); document.querySelectorAll(".verHistorialProvBtn").forEach(btn=>{ let prov=db.proveedores.find(p=>p.id===btn.dataset.id); alert(JSON.stringify(prov.historialCompras,null,2)); }); }
    // Sincronización extra: Backup y restore manual (para compartir entre dispositivos)
    function addGlobalBackupButtons(){ let backupDiv=document.createElement("div"); backupDiv.className="fixed bottom-4 right-4 flex gap-2 z-50"; backupDiv.innerHTML=`<button id="btnBackupData" class="bg-gray-800 text-white p-2 rounded-full shadow-lg"><i class="fas fa-database"></i> Backup</button><button id="btnRestoreData" class="bg-gray-800 text-white p-2 rounded-full shadow-lg"><i class="fas fa-upload"></i> Restore</button>`; document.body.appendChild(backupDiv); document.getElementById("btnBackupData")?.addEventListener("click",()=>{ let dataStr=JSON.stringify(db); let blob=new Blob([dataStr],{type:"application/json"}); let url=URL.createObjectURL(blob); let a=document.createElement("a"); a.href=url; a.download="pos_backup.json"; a.click(); }); document.getElementById("btnRestoreData")?.addEventListener("click",()=>{ let input=document.createElement("input"); input.type="file"; input.accept="application/json"; input.onchange=e=>{ let file=input.files[0]; let reader=new FileReader(); reader.onload=ev=>{ let restored=JSON.parse(ev.target.result); db=restored; persistData(); location.reload(); }; reader.readAsText(file); }; input.click(); }); }
    // Inicialización
    loadData(); setTab("ventas"); addGlobalBackupButtons();
    document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>setTab(btn.dataset.tab)));
    // Footer agradecimiento
    let footer=document.createElement("div"); footer.className="text-center text-xs text-gray-400 mt-8 border-t pt-4"; footer.innerHTML="© Escamilla B. Wilson M. - Sistema POS Avanzado | Desarrollado con ❤️ por Nexus Marketing 04244525765"; document.querySelector(".max-w-screen-2xl").appendChild(footer);
</script>
