<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>POS Escamilla B. Wilson M. | Sistema Profesional</title>
    <!-- Tailwind + Font Awesome + Librerías esenciales -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Estilos personalizados para scroll suave y efectos */
        .card-hover:hover { transform: translateY(-2px); transition: 0.2s; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .stock-alert { background-color: #fee2e2; border-left: 4px solid #ef4444; }
        .toast-notify { position: fixed; bottom: 20px; right: 20px; z-index: 9999; background: #1f2937; color: white; padding: 12px 20px; border-radius: 8px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); animation: fadeInOut 3s ease forwards; }
        @keyframes fadeInOut { 0% { opacity: 0; transform: translateY(20px); } 15% { opacity: 1; transform: translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .modal-backdrop { background-color: rgba(0,0,0,0.5); backdrop-filter: blur(3px); }
        .factura-preview { background: white; max-width: 380px; margin: 0 auto; font-family: 'Courier New', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <!-- BARRA SUPERIOR -->
    <header class="bg-gradient-to-r from-indigo-800 to-indigo-900 text-white shadow-lg sticky top-0 z-20">
        <div class="container mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-2">
            <div class="text-xl font-bold tracking-wide"><i class="fas fa-store mr-2"></i> Escamilla B. Wilson M.</div>
            <div class="flex flex-wrap gap-2 text-sm md:text-base">
                <button data-section="ventas" class="nav-btn px-3 py-1 rounded-lg bg-white/20 hover:bg-white/30 transition flex items-center gap-1"><i class="fas fa-cash-register"></i> Ventas</button>
                <button data-section="almacen" class="nav-btn px-3 py-1 rounded-lg bg-white/20 hover:bg-white/30 transition flex items-center gap-1"><i class="fas fa-boxes"></i> Almacén</button>
                <button data-section="fiados" class="nav-btn px-3 py-1 rounded-lg bg-white/20 hover:bg-white/30 transition flex items-center gap-1"><i class="fas fa-hand-holding-usd"></i> Fiados</button>
                <button data-section="reportes" class="nav-btn px-3 py-1 rounded-lg bg-white/20 hover:bg-white/30 transition flex items-center gap-1"><i class="fas fa-chart-line"></i> Cierre/Reportes</button>
                <button data-section="clientes" class="nav-btn px-3 py-1 rounded-lg bg-white/20 hover:bg-white/30 transition flex items-center gap-1"><i class="fas fa-users"></i> Clientes</button>
                <button data-section="proveedores" class="nav-btn px-3 py-1 rounded-lg bg-white/20 hover:bg-white/30 transition flex items-center gap-1"><i class="fas fa-truck"></i> Proveedores</button>
            </div>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL DINÁMICO -->
    <main id="app-root" class="container mx-auto px-3 py-5 max-w-7xl"></main>

    <!-- FOOTER AGRADECIMIENTO -->
    <footer class="text-center text-gray-500 text-xs py-4 border-t mt-8">
        <p>© Escamilla B. Wilson M. - Valencia Edo Carabobo | Tel: 0414-4372956 / 0412-4749513 | Desarrollado con ❤️ por <span class="font-semibold">Nexus Marketing 04244525765</span></p>
    </footer>

    <script>
        // ------------------------- MODELO DE DATOS (localStorage) -------------------------
        let db = {
            inventory: [],      // productos { id, uniqueCode, name, category, priceUSD, stock, image, createdAt, description }
            sales: [],          // ventas { id, invoiceNumber, date, clientId, clientName, phone, address, zone, seller, paymentMethod, items, totalAmount, status }
            clients: [],        // { id, name, phone, address, zone, totalDebt, saleIds }
            debts: [],          // registro pagos / deuda por venta (control)
            providers: [],      // { id, name, contact, debt, purchases }
            categories: ["Accesorios","Juguetes","Juguetes Avenguer","Lonchera y Cartucheras","Morrales","Peluches","Peluches personajes","Útiles Escolares"],
            addressZones: ["Centro","Norte","Sur","Este","Oeste","La Granja","Prebo"],
            nextInvoice: 1,
            nextProductCode: 1000,
            sellerName: localStorage.getItem("sellerName") || "Vendedor(a)"
        };
        
        function loadData() {
            const keys = ['inventory','sales','clients','debts','providers','categories','addressZones','nextInvoice','nextProductCode'];
            keys.forEach(k => { if(localStorage.getItem(k)) db[k] = JSON.parse(localStorage.getItem(k)); });
            if(!db.inventory.length) seedInitialData();
            if(!db.clients.length) db.clients = [];
            if(!db.providers.length) db.providers = [];
            if(!db.sales.length) db.sales = [];
            if(!db.debts.length) db.debts = [];
            db.nextInvoice = db.nextInvoice || 1;
            db.nextProductCode = db.nextProductCode || 1000;
            localStorage.setItem("sellerName", db.sellerName);
        }
        function seedInitialData() {
            db.inventory = [
                { id: Date.now()+1, uniqueCode: "PROD001", name: "Peluche Mickey", category: "Peluches", priceUSD: 12.5, stock: 15, image: "", createdAt: new Date().toISOString() },
                { id: Date.now()+2, uniqueCode: "PROD002", name: "Mochila Escolar", category: "Morrales", priceUSD: 28.9, stock: 6, image: "", createdAt: new Date().toISOString() },
                { id: Date.now()+3, uniqueCode: "PROD003", name: "Juego de Lápices", category: "Útiles Escolares", priceUSD: 5.2, stock: 3, image: "", createdAt: new Date().toISOString() },
                { id: Date.now()+4, uniqueCode: "PROD004", name: "Lonchera Termica", category: "Lonchera y Cartucheras", priceUSD: 18.0, stock: 20, image: "", createdAt: new Date().toISOString() },
            ];
            db.nextProductCode = 1004;
        }
        function persistAll() {
            localStorage.setItem("inventory", JSON.stringify(db.inventory));
            localStorage.setItem("sales", JSON.stringify(db.sales));
            localStorage.setItem("clients", JSON.stringify(db.clients));
            localStorage.setItem("debts", JSON.stringify(db.debts));
            localStorage.setItem("providers", JSON.stringify(db.providers));
            localStorage.setItem("categories", JSON.stringify(db.categories));
            localStorage.setItem("addressZones", JSON.stringify(db.addressZones));
            localStorage.setItem("nextInvoice", db.nextInvoice);
            localStorage.setItem("nextProductCode", db.nextProductCode);
        }

        // Helper: toast
        function showToast(msg, isError=false) {
            const toast = document.createElement('div');
            toast.className = `toast-notify ${isError ? 'bg-red-700' : 'bg-green-800'}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} mr-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // estado de la venta actual (carrito)
        let currentCart = []; // { productId, uniqueCode, name, quantity, unitPrice, subtotal }
        let currentInvoiceNumber = db.nextInvoice;
        let currentClientData = { name: "", phone: "", address: "", zone: "" };
        let currentPaymentMethod = "Efectivo";
        let currentSeller = db.sellerName;

        // renderizado global
        let activeSection = "ventas";
        function render() {
            if(activeSection === "ventas") renderVentas();
            else if(activeSection === "almacen") renderAlmacen();
            else if(activeSection === "fiados") renderFiados();
            else if(activeSection === "reportes") renderReportes();
            else if(activeSection === "clientes") renderClientes();
            else if(activeSection === "proveedores") renderProveedores();
        }

        // --- VENTAS: grilla productos, carrito, historial producto ---
        let selectedProductForHistory = null;
        function renderVentas() {
            const search = document.getElementById('productSearch')?.value.toLowerCase() || '';
            const filtered = db.inventory.filter(p => p.name.toLowerCase().includes(search) || p.uniqueCode.toLowerCase().includes(search));
            const productGrid = filtered.map(prod => `
                <div class="bg-white rounded-xl shadow p-3 ${prod.stock <= 6 ? 'stock-alert' : ''} card-hover transition">
                    <div class="flex justify-between"><span class="font-bold text-sm">${prod.name}</span><span class="text-xs bg-gray-200 px-2 rounded">${prod.uniqueCode}</span></div>
                    <div class="text-gray-600 text-xs">${prod.category}</div>
                    <div class="flex justify-between items-center mt-2"><span class="text-green-700 font-bold">$${prod.priceUSD.toFixed(2)}</span><span class="text-sm ${prod.stock<=6 ? 'text-red-600 font-bold' : ''}">Stock: ${prod.stock}</span></div>
                    <div class="flex gap-1 mt-2"><input type="number" id="qty-${prod.id}" value="1" min="1" max="${prod.stock}" class="w-16 border rounded px-1 text-sm"><button data-id="${prod.id}" data-name="${prod.name}" data-price="${prod.priceUSD}" data-stock="${prod.stock}" class="add-to-cart bg-indigo-600 text-white px-2 py-1 rounded text-xs flex-1"><i class="fas fa-cart-plus"></i> Agregar</button></div>
                    <button data-id="${prod.id}" class="view-history w-full text-left text-xs text-blue-600 mt-2"><i class="far fa-clock"></i> Historial ventas</button>
                </div>
            `).join('');
            const cartItemsHtml = currentCart.map((item, idx) => `
                <div class="flex justify-between text-sm border-b py-2">
                    <div class="w-2/5">${item.name}<br><span class="text-xs text-gray-500">${item.uniqueCode}</span></div>
                    <input type="number" data-index="${idx}" class="cart-qty w-12 border rounded text-center" value="${item.quantity}" min="1" step="1">
                    <input type="number" data-index="${idx}" class="cart-price w-16 border rounded text-center" value="${item.unitPrice.toFixed(2)}" step="0.01">
                    <span class="font-bold">$${(item.quantity * item.unitPrice).toFixed(2)}</span>
                    <button data-index="${idx}" class="remove-cart-item text-red-500"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
            const totalCart = currentCart.reduce((sum,i)=> sum + (i.quantity * i.unitPrice),0);
            const html = `
                <div class="grid lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 bg-white p-4 rounded-2xl shadow">
                        <div class="flex gap-2 mb-4"><input type="text" id="productSearch" placeholder="🔍 Buscar producto (nombre/código)" class="border p-2 rounded w-full"><button id="clearSearch" class="bg-gray-300 px-3 rounded"><i class="fas fa-times"></i></button></div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 max-h-[500px] overflow-y-auto">${productGrid}</div>
                    </div>
                    <div class="bg-white p-4 rounded-2xl shadow space-y-3">
                        <h3 class="font-bold text-lg"><i class="fas fa-receipt"></i> NOTA DE VENTA #<span id="invoiceNumDisplay">${currentInvoiceNumber}</span> <button id="editInvoiceBtn" class="text-xs bg-gray-200 px-2 rounded"><i class="fas fa-edit"></i></button></h3>
                        <div><label class="text-sm">Cliente:</label><input id="clientName" value="${currentClientData.name}" placeholder="Nombre" class="border rounded p-1 w-full"></div>
                        <div><label class="text-sm">Teléfono/WhatsApp:</label><input id="clientPhone" value="${currentClientData.phone}" placeholder="+58..." class="border rounded p-1 w-full"></div>
                        <div class="flex gap-2"><input id="clientAddress" value="${currentClientData.address}" placeholder="Dirección" class="border rounded p-1 w-2/3"><select id="addressZoneSelect" class="border rounded p-1 w-1/3"><option value="">Zona</option>${db.addressZones.map(z=>`<option ${currentClientData.zone===z?'selected':''}>${z}</option>`).join('')}</select><button id="addZoneBtn" class="bg-gray-200 px-2 rounded"><i class="fas fa-plus"></i></button></div>
                        <div><label class="text-sm">Vendedor:</label><input id="sellerInput" value="${currentSeller}" class="border rounded p-1 w-full"></div>
                        <div><label class="text-sm">Método de Pago:</label><select id="paymentMethodSelect" class="border rounded p-1 w-full">${["Efectivo","Pago móvil","Divisas","Biopago","Transferencia","Fiado Credito","Binance"].map(m=>`<option ${currentPaymentMethod===m?'selected':''}>${m}</option>`).join('')}</select></div>
                        <div class="border-t pt-2"><span class="font-bold">Carrito:</span> ${cartItemsHtml || '<div class="text-gray-400 text-center">Vacío</div>'}</div>
                        <div class="font-bold text-xl text-right">Total: $<span id="cartTotal">${totalCart.toFixed(2)}</span></div>
                        <div class="flex gap-2 mt-2"><button id="anularVentaBtn" class="bg-red-600 text-white px-3 py-2 rounded w-1/2"><i class="fas fa-ban"></i> Anular Venta</button><button id="concretarVentaBtn" class="bg-green-600 text-white px-3 py-2 rounded w-1/2"><i class="fab fa-whatsapp"></i> Concretar y Enviar</button></div>
                        <div class="text-xs text-gray-500 mt-2"><i class="fas fa-info-circle"></i> Stock rojo ≤6 unidades</div>
                    </div>
                </div>
                <div id="productHistoryModal" class="fixed inset-0 hidden bg-black/50 items-center justify-center z-50"><div class="bg-white rounded-lg p-5 max-w-md w-full"><div id="historyContent"></div><button id="closeHistoryModal" class="mt-3 bg-gray-500 text-white px-4 py-1 rounded">Cerrar</button></div></div>
            `;
            document.getElementById('app-root').innerHTML = html;
            document.getElementById('productSearch')?.addEventListener('input', () => renderVentas());
            document.getElementById('clearSearch')?.addEventListener('click', () => { document.getElementById('productSearch').value=''; renderVentas(); });
            document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id); const name = btn.dataset.name; const price = parseFloat(btn.dataset.price); const maxStock = parseInt(btn.dataset.stock);
                const qtyInput = document.getElementById(`qty-${id}`); let qty = parseInt(qtyInput?.value) || 1;
                if(qty > maxStock) { showToast(`Stock insuficiente, máximo ${maxStock}`, true); return; }
                const existing = currentCart.find(i => i.productId === id);
                if(existing) existing.quantity += qty;
                else currentCart.push({ productId: id, uniqueCode: db.inventory.find(p=>p.id===id)?.uniqueCode, name, quantity: qty, unitPrice: price, subtotal: price*qty });
                renderVentas();
            }));
            document.querySelectorAll('.view-history').forEach(btn => btn.addEventListener('click', (e) => {
                const prodId = parseInt(btn.dataset.id);
                const prod = db.inventory.find(p=>p.id===prodId);
                const salesHistory = db.sales.filter(sale => sale.items.some(it => it.productId === prodId)).map(s => `<li class="border-b py-1">📅 ${new Date(s.date).toLocaleString()} | Cliente: ${s.clientName} | Cant: ${s.items.find(it=>it.productId===prodId)?.quantity} | Monto: $${s.totalAmount.toFixed(2)}</li>`).join('');
                document.getElementById('historyContent').innerHTML = `<h4 class="font-bold">Historial: ${prod?.name}</h4><ul class="max-h-60 overflow-y-auto">${salesHistory || '<li>Sin ventas previas</li>'}</ul>`;
                document.getElementById('productHistoryModal').classList.remove('hidden');
            }));
            document.getElementById('closeHistoryModal')?.addEventListener('click',()=>document.getElementById('productHistoryModal').classList.add('hidden'));
            // eventos carrito edición y remoción
            document.querySelectorAll('.cart-qty').forEach(inp => inp.addEventListener('change', (e) => { let idx = parseInt(inp.dataset.index); if(!isNaN(idx)){ currentCart[idx].quantity = Math.max(1, parseInt(inp.value)||1); renderVentas(); } }));
            document.querySelectorAll('.cart-price').forEach(inp => inp.addEventListener('change', (e) => { let idx = parseInt(inp.dataset.index); if(!isNaN(idx)){ currentCart[idx].unitPrice = Math.max(0.01, parseFloat(inp.value)||0); renderVentas(); } }));
            document.querySelectorAll('.remove-cart-item').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.index); if(!isNaN(idx)){ currentCart.splice(idx,1); renderVentas(); } }));
            document.getElementById('editInvoiceBtn')?.addEventListener('click',()=>{ let newNum = prompt("Editar número de factura:", currentInvoiceNumber); if(newNum && !isNaN(parseInt(newNum)) && parseInt(newNum)>0){ if(db.sales.some(s=>s.invoiceNumber===parseInt(newNum))) showToast("Número de factura ya existe, elige otro",true); else currentInvoiceNumber = parseInt(newNum); renderVentas(); } });
            document.getElementById('anularVentaBtn')?.addEventListener('click',()=>{ currentCart = []; renderVentas(); showToast("Venta anulada, stock no afectado"); });
            document.getElementById('concretarVentaBtn')?.addEventListener('click',()=> finalizarVenta());
            document.getElementById('clientName')?.addEventListener('input',(e)=>currentClientData.name=e.target.value);
            document.getElementById('clientPhone')?.addEventListener('input',(e)=>currentClientData.phone=e.target.value);
            document.getElementById('clientAddress')?.addEventListener('input',(e)=>currentClientData.address=e.target.value);
            document.getElementById('addressZoneSelect')?.addEventListener('change',(e)=>currentClientData.zone=e.target.value);
            document.getElementById('sellerInput')?.addEventListener('input',(e)=>{ currentSeller=e.target.value; db.sellerName=currentSeller; localStorage.setItem("sellerName",currentSeller); });
            document.getElementById('paymentMethodSelect')?.addEventListener('change',(e)=>currentPaymentMethod=e.target.value);
            document.getElementById('addZoneBtn')?.addEventListener('click',()=>{ let newZone = prompt("Nueva zona:"); if(newZone && !db.addressZones.includes(newZone)){ db.addressZones.push(newZone); persistAll(); renderVentas(); showToast("Zona agregada"); } });
        }
        async function finalizarVenta() {
            if(currentCart.length===0){ showToast("Carrito vacío",true); return; }
            if(!currentClientData.name.trim()){ showToast("Ingrese nombre del cliente",true); return; }
            // Verificar stock antes de deducir
            for(let item of currentCart){
                const prod = db.inventory.find(p=>p.id===item.productId);
                if(!prod || prod.stock < item.quantity){ showToast(`Stock insuficiente para ${item.name}`,true); return; }
            }
            // Descontar stock
            for(let item of currentCart){
                const prod = db.inventory.find(p=>p.id===item.productId);
                prod.stock -= item.quantity;
            }
            const saleId = Date.now();
            const invoice = currentInvoiceNumber;
            if(db.sales.some(s=>s.invoiceNumber===invoice)){ showToast("Factura duplicada, edite número",true); return; }
            const sale = {
                id: saleId, invoiceNumber: invoice, date: new Date().toISOString(), clientName: currentClientData.name, phone: currentClientData.phone,
                address: currentClientData.address, zone: currentClientData.zone, seller: currentSeller, paymentMethod: currentPaymentMethod,
                items: currentCart.map(i=>({ productId:i.productId, uniqueCode:i.uniqueCode, name:i.name, quantity:i.quantity, unitPrice:i.unitPrice, total:i.quantity*i.unitPrice })),
                totalAmount: currentCart.reduce((a,i)=>a+(i.quantity*i.unitPrice),0), status: currentPaymentMethod==="Fiado Credito" ? "Pendiente" : "Pagado"
            };
            db.sales.push(sale);
            // Clientes
            let existingClient = db.clients.find(c=>c.phone===currentClientData.phone || (c.name===currentClientData.name && c.phone));
            if(!existingClient){
                existingClient = { id: Date.now(), name: currentClientData.name, phone: currentClientData.phone, address: currentClientData.address, zone: currentClientData.zone, totalDebt: 0, saleIds: [] };
                db.clients.push(existingClient);
            }
            existingClient.saleIds.push(saleId);
            if(currentPaymentMethod==="Fiado Credito"){
                existingClient.totalDebt += sale.totalAmount;
                db.debts.push({ id:Date.now(), clientId:existingClient.id, saleId, amount:sale.totalAmount, paid:0, pending:sale.totalAmount, date:sale.date });
            }
            persistAll();
            // Generar imagen factura y whatsapp
            await generarYEnviarFactura(sale);
            currentCart = [];
            currentInvoiceNumber = db.nextInvoice = (parseInt(currentInvoiceNumber)+1);
            currentClientData = { name:"", phone:"", address:"", zone:"" };
            persistAll();
            renderVentas();
            showToast(`Venta #${invoice} completada. Stock actualizado.`);
        }
        async function generarYEnviarFactura(sale) {
            const facturaDiv = document.createElement('div');
            facturaDiv.className = "p-5 bg-white rounded-lg shadow-lg max-w-md";
            facturaDiv.innerHTML = `
                <div class="text-center border-b pb-2"><h2 class="text-xl font-bold">Escamilla B. Wilson M.</h2><p class="text-xs">Valencia, Edo Carabobo | Tel: 0414-4372956 / 0412-4749513</p><p class="text-xs italic">Nota de Venta</p></div>
                <div class="text-xs mt-2"><strong>Factura N°:</strong> ${sale.invoiceNumber} &nbsp; <strong>Fecha:</strong> ${new Date(sale.date).toLocaleString()}<br><strong>Cliente:</strong> ${sale.clientName} | ${sale.phone}<br><strong>Dirección:</strong> ${sale.address} (${sale.zone})<br><strong>Vendedor:</strong> ${sale.seller} | Pago: ${sale.paymentMethod}</div>
                <table class="w-full text-xs mt-2 border-collapse"><thead><tr class="border-b"><th>Prod</th><th>Cant</th><th>Precio</th><th>Subtotal</th></tr></thead><tbody>${sale.items.map(it=>`<tr><td>${it.name}<br><span class="text-gray-400">${it.uniqueCode}</span></td><td>${it.quantity}</td><td>$${it.unitPrice.toFixed(2)}</td><td>$${it.total.toFixed(2)}</td></tr>`).join('')}</tbody></table>
                <div class="text-right font-bold mt-2">TOTAL: $${sale.totalAmount.toFixed(2)}</div>
                <div class="text-center text-[10px] text-gray-400 mt-3 watermark opacity-30">Gracias por su compra - Nota de venta válida</div>
            `;
            document.body.appendChild(facturaDiv);
            const canvas = await html2canvas(facturaDiv, { scale: 2 });
            const imgData = canvas.toDataURL('image/png');
            facturaDiv.remove();
            const link = document.createElement('a');
            link.download = `factura_${sale.invoiceNumber}.png`;
            link.href = imgData;
            link.click();
            // Enviar WhatsApp si hay número
            if(sale.phone && sale.phone.trim()){
                const cleanPhone = sale.phone.replace(/[^0-9+]/g, '');
                const waMsg = encodeURIComponent(`✅ Escamilla B. Wilson M. - Factura #${sale.invoiceNumber}\nTotal: $${sale.totalAmount.toFixed(2)}\nAdjuntamos imagen de su nota de venta. ¡Gracias!`);
                window.open(`https://wa.me/${cleanPhone}?text=${waMsg}`, '_blank');
                showToast("Abriendo WhatsApp para enviar nota (adjunte la imagen descargada)");
            } else showToast("Nota descargada en PNG, compártala por WhatsApp");
        }

        // Almacén completo
        function renderAlmacen() {
            let html = `<div class="bg-white p-4 rounded-2xl shadow"><div class="flex justify-between"><h2 class="font-bold text-xl"><i class="fas fa-warehouse"></i> Gestión Inventario</h2><button id="newProductBtn" class="bg-indigo-600 text-white px-3 py-1 rounded"><i class="fas fa-plus"></i> Nuevo Producto</button></div>
            <input type="text" id="filterCategory" placeholder="Filtrar por categoría" class="border p-2 rounded w-full mt-2"><div class="overflow-x-auto mt-3"><table class="min-w-full"><thead><tr><th>Foto</th><th>Código</th><th>Nombre</th><th>Categoría</th><th>Stock</th><th>Precio $</th><th>Acciones</th></tr></thead><tbody id="inventoryTableBody"></tbody></table></div><button id="downloadInventoryExcel" class="mt-3 bg-green-700 text-white px-4 py-2 rounded"><i class="fas fa-file-excel"></i> Descargar Excel Inventario</button></div>`;
            document.getElementById('app-root').innerHTML = html;
            function renderTable() { const filter = document.getElementById('filterCategory')?.value.toLowerCase() || ''; const filtered = db.inventory.filter(p => !filter || p.category.toLowerCase().includes(filter)); document.getElementById('inventoryTableBody').innerHTML = filtered.map(p => `<tr class="border-b"><td><img src="${p.image || 'https://via.placeholder.com/40'}" class="w-10 h-10 object-cover rounded"></td><td>${p.uniqueCode}</td><td>${p.name}</td><td>${p.category}</td><td><input type="number" id="stock-${p.id}" value="${p.stock}" class="w-16 border rounded" min="0"><button data-id="${p.id}" class="update-stock bg-blue-500 text-white px-1 rounded text-xs">Actualizar</button></td><td><input type="number" id="price-${p.id}" value="${p.priceUSD}" step="0.01" class="w-20 border rounded"><button data-id="${p.id}" class="update-price bg-yellow-500 text-white px-1 rounded text-xs">$</button></td><td><button data-id="${p.id}" class="delete-product text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join(''); }
            renderTable();
            document.getElementById('filterCategory')?.addEventListener('input', renderTable);
            document.querySelectorAll('.update-stock').forEach(btn => btn.addEventListener('click',(e)=>{ let id=parseInt(btn.dataset.id); let prod=db.inventory.find(p=>p.id===id); let newStock=parseInt(document.getElementById(`stock-${id}`).value); if(!isNaN(newStock)){ prod.stock=newStock; persistAll(); renderTable(); showToast("Stock actualizado"); } }));
            document.querySelectorAll('.update-price').forEach(btn=>btn.addEventListener('click',(e)=>{ let id=parseInt(btn.dataset.id); let prod=db.inventory.find(p=>p.id===id); let newPrice=parseFloat(document.getElementById(`price-${id}`).value); if(!isNaN(newPrice)){ prod.priceUSD=newPrice; persistAll(); renderTable(); } }));
            document.querySelectorAll('.delete-product').forEach(btn=>btn.addEventListener('click',(e)=>{ if(confirm("Eliminar producto?")){ let id=parseInt(btn.dataset.id); db.inventory=db.inventory.filter(p=>p.id!==id); persistAll(); renderTable(); } }));
            document.getElementById('newProductBtn')?.addEventListener('click',()=>{ let name=prompt("Nombre producto:"); let cat=prompt("Categoría (puede escribir nueva):", db.categories[0]); if(cat && !db.categories.includes(cat)) db.categories.push(cat); let price=parseFloat(prompt("Precio USD:")); let stock=parseInt(prompt("Stock inicial:")); if(name && price && !isNaN(stock)){ let code = `PROD${db.nextProductCode++}`; db.inventory.push({ id:Date.now(), uniqueCode:code, name, category:cat||"General", priceUSD:price, stock, image:"", createdAt:new Date().toISOString() }); persistAll(); renderTable(); showToast(`Producto ${name} agregado`); } });
            document.getElementById('downloadInventoryExcel')?.addEventListener('click',()=>{ const ws = XLSX.utils.json_to_sheet(db.inventory.map(p=>({Código:p.uniqueCode,Nombre:p.name,Categoría:p.category,Stock:p.stock,PrecioUSD:p.priceUSD}))); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Inventario"); XLSX.writeFile(wb,`inventario_${new Date().toISOString()}.xlsx`); showToast("Excel descargado"); });
        }
        // Fiados (deuda por cliente agrupada)
        function renderFiados() {
            let clientDebts = db.clients.filter(c=>c.totalDebt>0).map(c=>({...c, debt:c.totalDebt}));
            let html = `<div class="bg-white p-4 rounded-2xl shadow"><h2 class="font-bold text-xl"><i class="fas fa-file-invoice-dollar"></i> Cartera de Fiados</h2><button id="downloadDebtsExcel" class="mb-2 bg-green-700 text-white px-3 py-1 rounded">Descargar Excel Deudas</button><table class="min-w-full"><thead><tr><th>Cliente</th><th>Teléfono</th><th>Deuda $</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>${clientDebts.map(c=>`<tr><td>${c.name}</td><td>${c.phone}</td><td class="font-bold text-red-600">$${c.debt.toFixed(2)}</td><td>Pendiente</td><td><button data-client="${c.id}" class="pay-debt bg-blue-600 text-white px-2 py-1 rounded text-sm">Registrar Pago</button></td></tr>`).join('')}</tbody></table></div>`;
            document.getElementById('app-root').innerHTML = html;
            document.querySelectorAll('.pay-debt').forEach(btn=>btn.addEventListener('click',()=>{ let clientId=parseInt(btn.dataset.client); let client=db.clients.find(c=>c.id===clientId); let monto=parseFloat(prompt(`Deuda actual $${client.totalDebt.toFixed(2)}. Monto a pagar:`)); if(!isNaN(monto) && monto>0){ let nuevoTotal=Math.max(0, client.totalDebt - monto); client.totalDebt=nuevoTotal; db.debts.push({id:Date.now(),clientId, saleId:null, amount:-monto, paid:monto, pending:nuevoTotal, date:new Date().toISOString()}); persistAll(); renderFiados(); showToast(`Pago registrado, nueva deuda $${nuevoTotal.toFixed(2)}`); } }));
            document.getElementById('downloadDebtsExcel')?.addEventListener('click',()=>{ const ws=XLSX.utils.json_to_sheet(clientDebts.map(c=>({Cliente:c.name,Telefono:c.phone,DeudaUSD:c.debt}))); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Deudas"); XLSX.writeFile(wb,`deudas_${new Date().toISOString()}.xlsx`); });
        }
        // Reportes y cierres
        function renderReportes() { let ventas=db.sales; let html=`<div class="bg-white p-4 rounded-2xl shadow"><h2><i class="fas fa-chart-bar"></i> Reportes de Ventas</h2><button id="exportSalesExcel" class="bg-green-700 text-white px-3 py-1 rounded">Exportar Excel Ventas</button><button id="inventoryTodayReport" class="bg-blue-700 text-white px-3 py-1 rounded">Inventario Hoy</button><div class="overflow-x-auto"><table class="min-w-full"><thead><tr><th>Fecha</th><th>Factura</th><th>Cliente</th><th>Total $</th><th>Método</th><th>Vendedor</th></tr></thead><tbody>${ventas.map(v=>`<tr><td>${new Date(v.date).toLocaleString()}</td><td>${v.invoiceNumber}</td><td>${v.clientName}</td><td>$${v.totalAmount.toFixed(2)}</td><td>${v.paymentMethod}</td><td>${v.seller}</td></tr>`).join('')}</tbody></table></div></div>`;
            document.getElementById('app-root').innerHTML = html;
            document.getElementById('exportSalesExcel')?.addEventListener('click',()=>{ const ws=XLSX.utils.json_to_sheet(db.sales.map(s=>({Fecha:new Date(s.date).toLocaleString(),Factura:s.invoiceNumber,Cliente:s.clientName,Total:s.totalAmount,Metodo:s.paymentMethod,Vendedor:s.seller}))); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"Ventas"); XLSX.writeFile(wb,`reporte_ventas.xlsx`); });
            document.getElementById('inventoryTodayReport')?.addEventListener('click',()=>{ const ws=XLSX.utils.json_to_sheet(db.inventory.map(p=>({Codigo:p.uniqueCode,Producto:p.name,Categoria:p.category,Stock:p.stock,PrecioUSD:p.priceUSD}))); XLSX.writeFile(XLSX.utils.book_new(),"inventario_actual.xlsx"); });
        }
        function renderClientes() { let filtroInput = `<input id="clientFilter" placeholder="Filtrar por nombre" class="border p-2 rounded w-full mb-2">`; let clientesHtml = db.clients.map(c=>`<div class="border p-2 rounded ${c.totalDebt>0?'bg-red-100':''}"><strong>${c.name}</strong> - ${c.phone} - Deuda: $${c.totalDebt.toFixed(2)}<button data-id="${c.id}" class="view-client-details text-blue-600 ml-2">Ver compras</button></div>`).join(''); let html=`<div class="bg-white p-4 rounded-2xl shadow"><h2>Clientes</h2>${filtroInput}<div id="clientList">${clientesHtml}</div><div id="clientDetailModal" class="fixed inset-0 hidden bg-black/50 flex items-center justify-center"><div class="bg-white p-4 rounded max-w-md w-full"><div id="detailContent"></div><button id="closeDetailModal" class="bg-gray-500 text-white px-3 py-1 rounded">Cerrar</button></div></div></div>`;
            document.getElementById('app-root').innerHTML = html;
            document.getElementById('clientFilter')?.addEventListener('input',(e)=>{ let val=e.target.value.toLowerCase(); let filtered=db.clients.filter(c=>c.name.toLowerCase().includes(val)); document.getElementById('clientList').innerHTML=filtered.map(c=>`<div class="border p-2 rounded ${c.totalDebt>0?'bg-red-100':''}"><strong>${c.name}</strong> - ${c.phone} - Deuda: $${c.totalDebt.toFixed(2)}<button data-id="${c.id}" class="view-client-details text-blue-600 ml-2">Ver compras</button></div>`).join(''); attachClientDetailEvents(); });
            function attachClientDetailEvents(){ document.querySelectorAll('.view-client-details').forEach(btn=>btn.addEventListener('click',(e)=>{ let id=parseInt(btn.dataset.id); let client=db.clients.find(c=>c.id===id); let compras=db.sales.filter(s=>client.saleIds.includes(s.id)).map(s=>`Factura #${s.invoiceNumber} - $${s.totalAmount} - ${new Date(s.date).toLocaleDateString()}`).join('<br>'); document.getElementById('detailContent').innerHTML=`<h3>${client.name}</h3><p>Deuda: $${client.totalDebt}</p><p>Compras:<br>${compras||'Ninguna'}</p>`; document.getElementById('clientDetailModal').classList.remove('hidden'); })); }
            attachClientDetailEvents(); document.getElementById('closeDetailModal')?.addEventListener('click',()=>document.getElementById('clientDetailModal').classList.add('hidden'));
        }
        function renderProveedores() { let html=`<div class="bg-white p-4 rounded-2xl shadow"><h2>Proveedores</h2><button id="newProviderBtn" class="bg-indigo-600 text-white px-3 py-1 rounded">Agregar Proveedor</button><div id="providersList"></div></div>`; document.getElementById('app-root').innerHTML = html; function renderProviders(){ document.getElementById('providersList').innerHTML = db.providers.map(p=>`<div class="border p-2 my-1"><strong>${p.name}</strong> - Contacto: ${p.contact} - Deuda: $${p.debt||0}<button data-id="${p.id}" class="pay-provider ml-2 bg-blue-500 text-white px-2 rounded">Pagar</button></div>`).join(''); } renderProviders(); document.getElementById('newProviderBtn')?.addEventListener('click',()=>{ let name=prompt("Nombre proveedor:"); let contact=prompt("Teléfono/contacto:"); if(name){ db.providers.push({id:Date.now(),name,contact,debt:0,purchases:[]}); persistAll(); renderProviders(); } }); document.querySelectorAll('.pay-provider').forEach(btn=>btn.addEventListener('click',()=>{ let id=parseInt(btn.dataset.id); let prov=db.providers.find(p=>p.id===id); let monto=parseFloat(prompt(`Deuda actual $${prov.debt}. Monto a pagar:`)); if(!isNaN(monto) && monto>0){ prov.debt=Math.max(0,prov.debt-monto); persistAll(); renderProviders(); showToast("Pago registrado"); } })); }

        // NAVEGACIÓN
        document.querySelectorAll('.nav-btn').forEach(btn => { btn.addEventListener('click', (e) => { activeSection = btn.dataset.section; render(); }); });
        loadData(); render();
    </script>
</body>
</html>
